<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIBER - Mindful Consumption</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        :root {
            --bg: #111110;
            --bg2: #1a1a18;
            --bg3: #222220;
            --text: #f5f2e8;
            --text2: #c8c4b4;
            --text3: #888478;
            --accent: #9ab870;
            --danger: #c07060;
            
            --font-display: Georgia, serif;
            --font-body: 'Helvetica Neue', Arial, sans-serif;
            --font-label: 'Courier New', Courier, monospace;
        }

        body {
            margin: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: var(--font-body);
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        * {
            box-sizing: border-box;
        }

        h1, h2, h3 {
            font-family: var(--font-display);
            font-weight: normal;
            margin: 0;
        }

        i { font-style: italic; }

        button {
            background: transparent;
            color: var(--text);
            border: 1px solid var(--text3);
            border-radius: 4px;
            padding: 12px 24px;
            font-family: var(--font-label);
            font-size: 14px;
            cursor: pointer;
            transition: all 0.15s ease;
            text-transform: lowercase; /* UI rule: always lowercase for UI labels */
        }

        button:hover:not(:disabled) {
            border-color: var(--text);
        }

        button.primary {
            background: var(--accent);
            color: var(--bg);
            border-color: var(--accent);
        }

        button.primary:hover:not(:disabled) {
            background: transparent;
            color: var(--accent);
        }

        button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        textarea {
            width: 100%;
            background: var(--bg2);
            border: 1px solid var(--bg3);
            border-radius: 8px;
            color: var(--text);
            padding: 16px;
            font-family: var(--font-body);
            font-size: 16px;
            margin-bottom: 24px;
            outline: none;
            resize: vertical;
            min-height: 100px;
            transition: border-color 0.2s;
        }

        textarea:focus {
            border-color: var(--accent);
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 60px 24px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .label {
            font-family: var(--font-label);
            font-size: 12px;
            color: var(--text3);
            letter-spacing: 1px;
            margin-bottom: 8px;
            display: block;
        }

        .tile-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 32px;
            margin-bottom: 40px;
        }

        .tile {
            background: var(--bg2);
            border: 1px solid var(--bg3);
            border-radius: 8px;
            padding: 16px 20px;
            cursor: pointer;
            font-size: 15px;
            transition: transform 0.1s, border 0.1s, background 0.1s;
            user-select: none;
        }

        .tile.selected {
            border: 2px solid var(--accent);
            background: var(--bg);
            transform: scale(0.96);
        }

        .fade-in {
            animation: fadeIn 0.45s ease forwards;
            transform: translateY(10px);
            opacity: 0;
        }

        @keyframes fadeIn {
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const TILES = [
            "3am awake, no reason", "Just existing quietly", "Sunday that bleeds into monday", 
            "90s Hip Hop", "Lo-fi at 1am", "Nas, Jay-Z, Tupac", "Just background hum", 
            "Rooftop.", "City humming", "Something alive out there", "Old Bollywood", 
            "Kishore, Lata, RD Burman", "Hidden cafe, one table", "Old cantonment roads", 
            "Empty highway at midnight", "Old bookshop corner", "Cold mountains, no plans", 
            "Military utility.", "Olive. Function.", "No logo. Just fabric.", "Quiet luxury.", 
            "Overdue haircut. Don't care.", "Beard on its own schedule.", "Binge watcher. No shame.", 
            "5am. Before the world wakes.", "Night owl. Brain peaks late.", "Messy desk. Organised mind.", 
            "Cricket. Stop everything for it.", "Football. Club over country.", "UFC/Boxing. Respect the craft.", 
            "Sports don't do it for me.", "Dark thrillers. Slow burn.", "Documentaries. Real is better.", 
            "World cinema. Subtitles fine.", "Comedy. Always comedy.", "Spicier. Always spicier.", 
            "Street food over restaurants. Always.", "One dish I eat on repeat.", "Forget to eat when busy.", 
            "Midnight visits. Fridge."
        ];

        function App() {
            const [view, setView] = useState('landing'); // landing | mirror-1 | mirror-2 | reveal
            const [selectedTiles, setSelectedTiles] = useState(new Set());
            const [confessions, setConfessions] = useState({ q1: '', q2: '', q3: '' });

            const toggleTile = (tile) => {
                const newSet = new Set(selectedTiles);
                if (newSet.has(tile)) {
                    newSet.delete(tile);
                } else {
                    newSet.add(tile);
                }
                setSelectedTiles(newSet);
            };

            const renderLanding = () => (
                <div className="container fade-in" style={{ justifyContent: 'center', alignItems: 'center', textAlign: 'center' }}>
                    <span className="label">BENGALURU, INDIA • EST. 2026</span>
                    <h1 style={{ fontSize: '48px', margin: '24px 0', letterSpacing: '4px' }}>F I B E R</h1>
                    <p style={{ color: 'var(--text2)', fontSize: '18px', maxWidth: '400px', lineHeight: '1.5', margin: '0 auto 40px auto' }}>
                        The only app in the world that succeeds when you buy less.
                    </p>
                    
                    <div style={{ textAlign: 'left', background: 'var(--bg2)', padding: '24px', borderRadius: '8px', marginBottom: '40px', maxWidth: '400px' }}>
                        <span className="label" style={{ color: 'var(--accent)', marginBottom: '16px' }}>₹199 / MONTH</span>
                        <p style={{ fontSize: '14px', color: 'var(--text2)', lineHeight: '1.6', margin: 0 }}>
                            No ads. No affiliate manipulation. No data selling. No freemium tricks. One honest price for one honest product.
                        </p>
                    </div>

                    <div style={{ display: 'flex', gap: '16px' }}>
                        <button onClick={() => alert('Added to waitlist.')}>join the waitlist</button>
                        <button className="primary" onClick={() => setView('mirror-1')}>build my mirror</button>
                    </div>
                </div>
            );

            const renderMirror1 = () => (
                <div className="container fade-in">
                    <span className="label">THE MIRROR • STAGE 1</span>
                    <h2 style={{ fontSize: '32px', marginBottom: '16px' }}><i>This isn't a form. Just react.</i></h2>
                    <p style={{ color: 'var(--text2)', lineHeight: '1.5', marginBottom: '8px' }}>
                        Scroll through. Tap what pulls you. Music, places, moods, habits, looks all of it.
                    </p>
                    <p style={{ color: 'var(--text2)', lineHeight: '1.5', marginBottom: '24px' }}>
                        No categories. No right answers. The things you pick tell us more than you'd tell us yourself.
                    </p>

                    <div className="tile-grid">
                        {TILES.map((tile, idx) => (
                            <div 
                                key={idx} 
                                className={`tile ${selectedTiles.has(tile) ? 'selected' : ''}`}
                                onClick={() => toggleTile(tile)}
                            >
                                {tile}
                            </div>
                        ))}
                    </div>

                    <div style={{ padding: '20px', borderTop: '1px solid var(--bg3)', background: 'var(--bg)', position: 'sticky', bottom: 0, display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginTop: 'auto' }}>
                        <div>
                            <span className="label" style={{ margin: 0 }}>{selectedTiles.size} selected</span>
                            <p style={{ fontSize: '12px', color: 'var(--text3)', margin: '4px 0 0 0' }}>Even 5 is enough to start.</p>
                        </div>
                        <button 
                            className="primary" 
                            disabled={selectedTiles.size < 5}
                            onClick={() => setView('mirror-2')}
                        >
                            continue to stage 2
                        </button>
                    </div>
                </div>
            );

            const renderMirror2 = () => (
                <div className="container fade-in">
                    <span className="label">THE MIRROR • STAGE 2</span>
                    <h2 style={{ fontSize: '32px', marginBottom: '16px' }}><i>Three confession prompts.</i></h2>
                    <p style={{ color: 'var(--text2)', lineHeight: '1.5', marginBottom: '40px' }}>
                        Optional. Answer as if you are talking to yourself, not to an app.
                    </p>

                    <span className="label" style={{ color: 'var(--text)' }}>"When nobody is watching, I usually..."</span>
                    <textarea 
                        value={confessions.q1}
                        onChange={(e) => setConfessions({...confessions, q1: e.target.value})}
                    />

                    <span className="label" style={{ color: 'var(--text)' }}>"I feel most like myself when..."</span>
                    <textarea 
                        value={confessions.q2}
                        onChange={(e) => setConfessions({...confessions, q2: e.target.value})}
                    />

                    <span className="label" style={{ color: 'var(--text)' }}>"The thing I own that I'd never explain to anyone is..."</span>
                    <textarea 
                        value={confessions.q3}
                        onChange={(e) => setConfessions({...confessions, q3: e.target.value})}
                    />

                    <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: 'auto', paddingTop: '40px' }}>
                        <button onClick={() => setView('mirror-1')}>back</button>
                        <button className="primary" onClick={() => setView('reveal')}>generate mirror</button>
                    </div>
                </div>
            );

            const renderReveal = () => (
                <div className="container fade-in" style={{ justifyContent: 'center' }}>
                    <span className="label" style={{ color: 'var(--accent)' }}>A LIVING DOCUMENT</span>
                    <h2 style={{ fontSize: '40px', margin: '16px 0 40px 0', lineHeight: '1.2' }}>
                        <i>The quiet one who notices everything.</i>
                    </h2>
                    
                    <div style={{ borderLeft: '1px solid var(--bg3)', paddingLeft: '24px' }}>
                        <div style={{ marginBottom: '24px' }}>
                            <span className="label">PRESENCE</span>
                            <p style={{ fontSize: '18px', margin: '8px 0 0 0' }}>Grounded - unannounced.</p>
                        </div>
                        <div>
                            <span className="label">AESTHETIC CORE</span>
                            <p style={{ fontSize: '18px', margin: '8px 0 0 0' }}>Utility with quiet conviction.</p>
                        </div>
                    </div>

                    <p style={{ color: 'var(--text3)', fontSize: '13px', lineHeight: '1.6', marginTop: '60px' }}>
                        This is a first reading based on your revealed preferences. It will update silently over time as behavior data accumulates in your vault.
                    </p>

                    <button style={{ marginTop: '40px', alignSelf: 'flex-start' }} onClick={() => setView('landing')}>return to home</button>
                </div>
            );

            return (
                <React.Fragment>
                    {view === 'landing' && renderLanding()}
                    {view === 'mirror-1' && renderMirror1()}
                    {view === 'mirror-2' && renderMirror2()}
                    {view === 'reveal' && renderReveal()}
                </React.Fragment>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
